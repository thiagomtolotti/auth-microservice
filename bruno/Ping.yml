info:
  name: Ping
  type: http
  seq: 1

http:
  method: GET
  url: "{{api_url}}/"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{api_url}}/"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: date
          value: Sun, 03 May 2026 02:51:02 GMT
        - name: server
          value: uvicorn
        - name: content-length
          value: "30"
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Service is alive"
          }
