info:
  name: Change Password
  type: http
  seq: 7

http:
  method: POST
  url: "{{api_url}}/change-password"
  body:
    type: json
    data: |-
      {
        "new_password": "@aa1234567"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{api_url}}/users/change_password"
      method: POST
      body:
        type: json
        data: |-
          {
            "new_password": "@aa1234567"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: date
          value: Sun, 10 May 2026 19:53:58 GMT
        - name: server
          value: uvicorn
        - name: content-length
          value: "43"
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Password changed successfully"
          }
  - name: Same password
    request:
      url: "{{api_url}}/users/change_password"
      method: POST
      body:
        type: json
        data: |-
          {
            "new_password": "@aa1234567"
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: date
          value: Sun, 10 May 2026 19:54:16 GMT
        - name: server
          value: uvicorn
        - name: content-length
          value: "89"
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "type": "ValidationError",
            "detail": "New password cannot be the same as the old password"
          }
