info:
  name: Refresh Token
  type: http
  seq: 6

http:
  method: POST
  url: "{{api_url}}/users/refresh"
  body:
    type: json
    data: |-
      {
        "refresh_token": "{{refresh_token}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Ensure the request was successful before saving
        if (res.getStatus() === 200) {
          const data = res.getBody();
          
          if (data.access_token) {
            // Set the variable at the collection level
            bru.setVar("access_token", data.access_token);
            console.log("Access token saved to collection!");
          } else {
            console.error("No access_token found in response body");
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
