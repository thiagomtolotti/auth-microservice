info:
  name: Login
  type: http
  seq: 4

http:
  method: POST
  url: "{{api_url}}/login"
  body:
    type: json
    data: |-
      {
        "email": "thiagotolotti@gmail.com",
        "password": "@aa12345678"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Ensure the request was successful before saving
        if (res.getStatus() === 200) {
          const data = res.getBody();
          
          if (data.access_token && data.refresh_token) {
            // Set the variable at the collection level
            bru.setVar("access_token", data.access_token);
            bru.setVar("refresh_token", data.refresh_token);
            console.log("Tokens saved to collection!");
          } else {
            console.error("No access_token found in response body");
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: RequestValidationError
    request:
      url: "{{api_url}}/users/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": ""
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: date
          value: Sun, 03 May 2026 02:52:35 GMT
        - name: server
          value: uvicorn
        - name: content-length
          value: "349"
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": "error",
            "code": 422,
            "message": "Validation Failed",
            "errors": [
              {
                "field": "body - email",
                "message": "Value is not a valid email address: an email address must have an @-sign.",
                "type": "value_error",
                "input_provided": ""
              },
              {
                "field": "body - password",
                "message": "String should have at least 8 characters",
                "type": "string_too_short",
                "input_provided": ""
              }
            ]
          }
  - name: LoginFailedException
    request:
      url: "{{api_url}}/users/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "thiagotolotti@gmail.com",
            "password": "@aa123456"
          }
    response:
      status: 400
