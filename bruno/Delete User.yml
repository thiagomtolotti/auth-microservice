    request:
      url: "{{api_url}}/users"
      method: DELETE
    response:
      status: 200
      statusText: OK
      headers:
        - name: date
          value: Sun, 10 May 2026 19:55:05 GMT
        - name: server
          value: uvicorn
        - name: content-length
          value: "39"
